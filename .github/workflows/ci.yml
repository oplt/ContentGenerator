name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: content_generator
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Ruff
        run: |
          cd backend
          .venv/bin/ruff check .
      - name: Pytest
        run: |
          cd backend
          .venv/bin/pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Test
        run: |
          cd frontend
          npm run test
      - name: Build
        run: |
          cd frontend
          npm run build
      - name: Install Playwright Chromium
        run: |
          cd frontend
          npx playwright install chromium
      - name: Playwright E2E
        run: |
          cd frontend
          npm run e2e -- --project=chromium
